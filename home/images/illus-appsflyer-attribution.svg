<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#ff5ec4" stop-opacity=".30"/>
      <stop offset="100%" stop-color="#070217" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="afgrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff2d92"/>
      <stop offset="50%" stop-color="#7b2cff"/>
      <stop offset="100%" stop-color="#22e1ff"/>
    </linearGradient>
    <linearGradient id="step1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22e1ff"/>
      <stop offset="100%" stop-color="#7b2cff"/>
    </linearGradient>
    <linearGradient id="step2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7b2cff"/>
      <stop offset="100%" stop-color="#ff2d92"/>
    </linearGradient>
    <linearGradient id="step3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff2d92"/>
      <stop offset="100%" stop-color="#ff8a3d"/>
    </linearGradient>
    <linearGradient id="step4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ffd166"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-weight="700" font-size="14" fill="#fff" opacity=".75" letter-spacing="3">MMP ATTRIBUTION CHAIN</text>
  <text x="400" y="72" text-anchor="middle" font-family="Anton,Impact,sans-serif" font-size="24" fill="url(#afgrad)">AppsFlyer · Adjust · Branch · Kochava</text>

  <!-- Step 1 -->
  <g transform="translate(60 110)">
    <rect x="0" y="0" width="680" height="72" rx="16" fill="url(#step1)" fill-opacity=".22" stroke="url(#step1)" stroke-width="2"/>
    <circle cx="42" cy="36" r="22" fill="url(#step1)"/>
    <text x="42" y="44" text-anchor="middle" font-family="Anton,Impact,sans-serif" font-size="22" fill="#fff">1</text>
    <text x="82" y="32" font-family="Inter,Arial,sans-serif" font-weight="700" font-size="18" fill="#fff">Impression</text>
    <text x="82" y="54" font-family="Inter,Arial,sans-serif" font-size="12" fill="#fff" opacity=".75">User sees ad creative on a publisher app</text>
    <text x="640" y="44" text-anchor="end" font-family="Anton,Impact,sans-serif" font-size="22" fill="#22e1ff">CPM</text>
  </g>

  <!-- Step 2 -->
  <g transform="translate(80 196)">
    <rect x="0" y="0" width="640" height="72" rx="16" fill="url(#step2)" fill-opacity=".22" stroke="url(#step2)" stroke-width="2"/>
    <circle cx="42" cy="36" r="22" fill="url(#step2)"/>
    <text x="42" y="44" text-anchor="middle" font-family="Anton,Impact,sans-serif" font-size="22" fill="#fff">2</text>
    <text x="82" y="32" font-family="Inter,Arial,sans-serif" font-weight="700" font-size="18" fill="#fff">Click</text>
    <text x="82" y="54" font-family="Inter,Arial,sans-serif" font-size="12" fill="#fff" opacity=".75">Tracked via attribution link · deep parameters</text>
    <text x="600" y="44" text-anchor="end" font-family="Anton,Impact,sans-serif" font-size="22" fill="#ff5ec4">CTR</text>
  </g>

  <!-- Step 3 -->
  <g transform="translate(120 282)">
    <rect x="0" y="0" width="560" height="72" rx="16" fill="url(#step3)" fill-opacity=".25" stroke="url(#step3)" stroke-width="2"/>
    <circle cx="42" cy="36" r="22" fill="url(#step3)"/>
    <text x="42" y="44" text-anchor="middle" font-family="Anton,Impact,sans-serif" font-size="22" fill="#fff">3</text>
    <text x="82" y="32" font-family="Inter,Arial,sans-serif" font-weight="700" font-size="18" fill="#fff">Install &amp; Open</text>
    <text x="82" y="54" font-family="Inter,Arial,sans-serif" font-size="12" fill="#fff" opacity=".78">Install attributed by MMP SDK · device match</text>
    <text x="520" y="44" text-anchor="end" font-family="Anton,Impact,sans-serif" font-size="22" fill="#ff8a3d">CVR</text>
  </g>

  <!-- Step 4 -->
  <g transform="translate(180 368)">
    <rect x="0" y="0" width="440" height="72" rx="16" fill="url(#step4)" fill-opacity=".30" stroke="url(#step4)" stroke-width="2"/>
    <circle cx="42" cy="36" r="22" fill="url(#step4)"/>
    <text x="42" y="44" text-anchor="middle" font-family="Anton,Impact,sans-serif" font-size="22" fill="#1a0033">4</text>
    <text x="82" y="32" font-family="Inter,Arial,sans-serif" font-weight="700" font-size="18" fill="#fff">In-App Event &amp; Revenue</text>
    <text x="82" y="54" font-family="Inter,Arial,sans-serif" font-size="12" fill="#fff" opacity=".82">ROAS, LTV and retention measured end-to-end</text>
    <text x="400" y="44" text-anchor="end" font-family="Anton,Impact,sans-serif" font-size="22" fill="#ffd166">ROAS</text>
  </g>

  <!-- Connecting funnel lines -->
  <g stroke="#fff" stroke-opacity=".18" stroke-dasharray="2 4">
    <line x1="60" y1="182" x2="80" y2="196"/>
    <line x1="740" y1="182" x2="720" y2="196"/>
    <line x1="80" y1="268" x2="120" y2="282"/>
    <line x1="720" y1="268" x2="680" y2="282"/>
    <line x1="120" y1="354" x2="180" y2="368"/>
    <line x1="680" y1="354" x2="620" y2="368"/>
  </g>

  <!-- Caption -->
  <text x="400" y="475" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-weight="700" font-size="12" fill="#fff" opacity=".7" letter-spacing="3">FULL FUNNEL · TRANSPARENT REPORTING</text>
</svg>
