<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 90" fill="none" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="wordGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff2d92"/>
      <stop offset="50%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ffd166"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22e1ff"/>
      <stop offset="100%" stop-color="#7b2cff"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff2d92"/>
      <stop offset="100%" stop-color="#ff8a3d"/>
    </linearGradient>
  </defs>

  <!-- Stylized globe icon -->
  <g transform="translate(8 18)">
    <circle cx="27" cy="27" r="25" fill="none" stroke="url(#iconGrad)" stroke-width="2.6"/>
    <ellipse cx="27" cy="27" rx="25" ry="10" fill="none" stroke="url(#iconGrad)" stroke-width="1.6" opacity=".65"/>
    <ellipse cx="27" cy="27" rx="10" ry="25" fill="none" stroke="url(#iconGrad)" stroke-width="1.6" opacity=".65"/>
    <line x1="2" y1="27" x2="52" y2="27" stroke="url(#iconGrad)" stroke-width="1.4" opacity=".55"/>
    <circle cx="27" cy="27" r="5.5" fill="url(#coreGrad)"/>
  </g>

  <!-- Wordmark -->
  <text x="76" y="52" font-family="Anton, Impact, 'Oswald', sans-serif" font-size="34" font-weight="800" fill="url(#wordGrad)" letter-spacing="0.5">BORDERLESSAD</text>

  <!-- Tagline -->
  <text x="77" y="72" font-family="Inter, Arial, sans-serif" font-size="8.5" font-weight="600" fill="#fff" opacity=".68" letter-spacing="4">MOBILE AD TECH</text>
</svg>
