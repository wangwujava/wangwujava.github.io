  <text x="400" y="475" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-weight="700" font-size="12" fill="#fff" opacity=".75" letter-spacing="3">CREATIVE · IMAGING · REGIONALIZATION · MARKET-DRIVEN</text>
